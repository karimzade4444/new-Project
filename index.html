<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="top">
        <h1>Управление карточками</h1>
        <p>Добавляйте, редактируйте и управляйте своими карточками</p>
      </div>
      <div class="middle">
        <input  type="search" name="" id="" class="search" placeholder="Поиск по названию или описанию..."/>
        <div class="middleLeft">
          <select name="status" id="" class="sel1">
            <option value="Все категории">Все категории</option>
            <option value="Работа">Работа</option>
            <option value="Личное">Личное</option>
            <option value="Проект">Проект</option>
          </select>
          <button class="add">+ Добавить</button>
        </div>
      </div>
    <div class="footer">
   

    </div>


<div class="viewmodal">
        <div class="intmodal">
            <div class="modaltop"><h1>Покупка в магазине</h1><p>👁️</p></div>
            <div class="str1">
                <p>Описание</p>
                <p>kdfjlsdjflkdsjflkdsjklf</p>
            </div>
            <div class="str2">
                <p>Категория</p>
                <p>личное</p>
            </div>

            <div class="str3">
                <p>Создано</p>
                <p>dfdfd</p>
            </div>
            <div class="CreatCancel">
                <button class="Cancel">Закрыть</button>
                <button class="editmodal">Редактировать</button>
            </div>
    </div>
    </div>

  <div class="viewcreatmodal">
        <div class="intcreatmodal">
            <div class="creatmodaltop"><h1>Редактировать карточку</h1></div>
            <form class="updateForm">
            <div class="st1">
                <input type="hidden" name="" id="" class="id">
                <p>Название</p>
                <input type="text" name="nameinp" id="" placeholder="Введите название..."  style="margin-left: 20px; width: 350px; height: 40px; border-radius: 20px; padding-left: 10px;">
            </div>
            <div class="st2">
                <p>Описание</p>
               <textarea name="des" id="" style="margin-left: 20px; width: 350px; height: 80px; border-radius: 20px; resize: none;padding: 10px 10px;" placeholder="Введите описание..."></textarea>
            </div>
           <div class="st3">
            <p>Категория</p>
            <select name="status" id=""  style="width: 370px; margin-left: 20px; border: 0; height: 40px; cursor: pointer;">
            <option >Все категории</option>
            <option value="Работа">Работа</option>
            <option value="Личное">Личное</option>
            <option value="Проект">Проект</option>
          </select>
            </div>
            <div class="closesave">
                <button class="Close" type="button">Закрыть</button>
                <button class="Save">Сохранить</button>
            </div>
            </form>
    </div>
    </div>



    <script src="scr.js"></script>
  </body>
</html>
